  Требования:
  1. Правильная базовая структура (DOCTYPE, lang, charset, viewport, title)
  2. <header> с:
     - Логотипом (h1 с именем)

     a) "Обо мне" (id="about"):
        - Фото (img с alt, figure/figcaption)
        - Абзац о себе с тегами strong, em, mark
        - Список навыков (ul)
     b) "Проекты" (id="projects"):
        - 3 карточки (article) с:
          - Заголовком h3
          - Описанием
          - Ссылкой на GitHub (внешняя, новая вкладка)
          - data-атрибутами (data-tech, data-year)
     c) "Контакты" (id="contacts"):
        - Форма обратной связи:
          - Имя (text, required)
          - Email (email, required)
          - Тема (select с 3 вариантами)
          - Сообщение (textarea)
          - Чекбокс "Согласен на обработку данных" (required)
          - Кнопка отправки
        - Ссылки: email, телефон, GitHub
  4. <aside> с "Последние статьи" (нумерованный список)
  5. <footer> с копирайтом и тегом <time>
