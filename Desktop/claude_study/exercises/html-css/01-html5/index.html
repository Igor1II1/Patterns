  - Год издания (number, от 1000 до 2026)
  - Жанр (select: Художественная / Техническая / Научная / Другое)
  - Статус (radio: Хочу прочитать / Читаю / Прочитал)
  - Оценка (range от 1 до 10, показывать текущее значение)
  - Заметки (textarea)
  - Кнопки: Добавить (submit) и Сбросить (reset)
